model:
  point_hidden_dims:
  - 32
  - 64
  - 64
  decoder_hidden_dims:
  - 64
  - 32
  use_max_pool: true
  use_mean_pool: true
  use_collision_head: true
  clearance_clip_m: 5.0
schema_version: 1
dataset: sgcf_nrmp_project/artifacts/datasets/geometry_v1
device: cpu
training:
  seed: 20260711
  batch_size: 64
  max_epochs: 20
  learning_rate: 0.001
  weight_decay: 0.0001
