  gradient_clip_norm: 5.0
  distance_loss_weight: 1.0
  collision_loss_weight: 0.2
  local_linearity_weight: 0.0
  category_weights:
  - 1.0
  - 1.5
  - 2.0
  - 2.0
overfit:
  sample_count: 64
  steps: 250
  required_loss_ratio: 0.35
