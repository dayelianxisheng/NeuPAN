world:
  height: 11
  width: 13
  step_time: 0.1
  sample_time: 0.1
  offset: [1.3, 1.3]
  collision_mode: 'stop'  # 'stop', 'unobstructed', 'reactive'
  control_mode: 'auto'  # 'keyboard', 'auto'

robot:
  - kinematics: {name: 'omni'}
    shape: {name: 'rectangle', length: 0.42, width: 0.26}
    vel_min: [-2, -2]
    vel_max: [2, 2]
    goal_threshold: 0.1
    plot:
      show_trail: True
      show_goal: False
      show_trajectory: False
    sensors:
      - type: 'lidar2d'
        range_min: 0
        range_max: 3
        angle_range: 6.28
        number: 50
        noise: False

robot:
  - kinematics: {name: 'omni'} 
    shape: {name: 'rectangle', length: 1.6, width: 13.0}
    state: [2.6, 11.0, 1.57] 
    goal: [10.5, 10.5, 0] 
    vel_min: [-8, -8]
    vel_max: [8, 8]
    goal_threshold: 0.3
    plot:
      show_trail: True
      traj_color: 'g'
      show_trajectory: False
      show_goal: False

    sensors: 
      - type: 'lidar2d'
        range_min: 0
        range_max: 10
        angle_range: 6.28
        number: 100
        noise: False