world:
  height: 11
  width: 13
  step_time: 0.1
  sample_time: 0.1
  offset: [1.3, 1.3]
  collision_mode: 'stop'  # 'stop', 'unobstructed', 'reactive'
  control_mode: 'auto'  # 'keyboard', 'auto'

robot:
  - kinematics: {name: 'omni'}
    shape: {name: 'rectangle', length: 0.42, width: 0.26}
    vel_min: [-2, -2]
    vel_max: [2, 2]
    goal_threshold: 0.1
    state: [6.0, 7.9, -1.57]
    goal: [7.6, 4.7, 0]
    plot:
      show_trail: True
      show_goal: False
      show_trajectory: False
    sensors:
      - type: 'lidar2d'
        range_min: 0
        range_max: 3
        angle_range: 6.28
        number: 50
        noise: False


obstacle:
  - number: 11
    distribution: {name: 'manual'}
    shape:
      - {name: 'polygon', random_shape: true, center_range: [0, 0, 0, 0], avg_radius_range: [0.13, 0.26], irregularity_range: [0.9, 1.0]}  # radius

    state: [[5.2, 8.8], [8.1, 9.9], [2.5, 5.2], [10.4, 6.8], [4.8, 4.8], [4.2, 6.8], [2.6, 6.2], [3.9, 5.2], [4.2, 6.8], [4.9, 6.8], [2.9, 3.9], [3.6, 3.9]]