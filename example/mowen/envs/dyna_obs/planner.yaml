receding: 10
step_time: 0.1
ref_speed: 0.8
device: 'cpu'
time_print: True
collision_threshold: 0.1

robot:
  kinematics: 'omni'
  max_speed: [8, 6.28]
  max_acce: [2, 1]
  length: 0.42
  width: 0.26

ipath:
  waypoints: [[6.0, 7.9, -1.57], [10.8, 7.3, -1], [7.9, 10.0, 2], [2.6, 5.0, -2], [7.6, 4.7, 3]]
  curve_style: 'line'
  min_radius: 1.0
  loop: False
  arrive_threshold: 0.1
  close_threshold: 0.1
  ind_range: 10
  arrive_index_threshold: 1

pan:
  iter_num: 2
  dune_max_num: 100
  nrmp_max_num: 10
  iter_threshold: 0.1
  dune_checkpoint: 'example/mowen/model/mowen_real/model_5000.pth'

adjust:
  q_s: 0.6
  p_u: 0.4
  eta: 10.0
  d_max: 0.15
  d_min: 0.03

