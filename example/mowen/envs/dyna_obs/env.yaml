world:
  height: 11
  width: 13
  step_time: 0.1
  sample_time: 0.1
  offset: [1.3, 1.3]
  collision_mode: 'stop'  # 'stop', 'unobstructed', 'reactive'
  control_mode: 'auto'  # 'keyboard', 'auto'

robot:
  - kinematics: {name: 'omni'}
    shape: {name: 'rectangle', length: 0.42, width: 0.26}
    vel_min: [-2, -2]
    vel_max: [2, 2]
    goal_threshold: 0.1
    state: [2.6, 11.0, 1.57]
    goal: [7.6, 4.7, 0]
    plot:
      show_trail: True
      show_goal: False
      show_trajectory: False
    sensors:
      - type: 'lidar2d'
        range_min: 0
        range_max: 3
        angle_range: 6.28
        number: 50
        noise: False


obstacle:
  - number: 20
    distribution: {name: 'random', range_low: [2.6, 2.6, -3.14], range_high: [10.5, 10.5, 3.14]}
    kinematics: {name: 'diff'}
    shape:
      - {name: 'circle', radius: 0.15}
      - {name: 'circle', radius: 0.3}
      - {name: 'circle', radius: 0.3}
      - {name: 'circle', radius: 0.12}

    behavior: 
      - {name: 'rvo', range_low: [2.6, 2.6, -3.14], range_high: [10.5, 10.5, 3.14], wander: True, vxmax: 0.1, vymax: 0.1}

    vel_min: [-1.0, -3.14]
    vel_max: [1.0, 3.14]
    arrive_mode: position
    goal_threshold: 0.3
    plot:
      show_goal: False
      show_arrow: True