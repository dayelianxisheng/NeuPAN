world:
  height: 11
  width: 13
  step_time: 0.1
  sample_time: 0.1
  offset: [1.3, 1.3]
  collision_mode: 'stop'  # 'stop', 'unobstructed', 'reactive'
  control_mode: 'auto'  # 'keyboard', 'auto'

robot:
  - kinematics: {name: 'omni'}
    shape: {name: 'rectangle', length: 0.42, width: 0.26}
    vel_min: [-2, -2]
    vel_max: [2, 2]
    goal_threshold: 0.1
    state: [2, 2, -1.57]
    goal: [10, 10, 0]
    plot:
      show_trail: True
      show_goal: False
      show_trajectory: False
    sensors:
      - type: 'lidar2d'
        range_min: 0
        range_max: 3
        angle_range: 6.28
        number: 50
        noise: False


obstacle:
  - number: 10
    distribution: {name: 'manual'}
    state: [[5.2, 8.8], [8.1, 9.9], [2.6, 5.2], [10.7, 6.5], [5.2, 3.4], [4.2, 6.8], [2.6, 6.2], [4.7, 5.2], [4.2, 6.8], [4.9, 6.8], [2.6, 7.8]]
    shape:
      - {name: 'circle', radius: 0.4}  # radius
      - {name: 'circle', radius: 0.26}  # radius

  - number: 1
    distribution: {name: 'manual'}
    state: [0.0, 0.0, 0]
    shape:
      - {name: 'polygon', vertices: [[8.1, 6.2], [8.6, 6.2], [8.6, 7.3], [8.1, 7.3]]}