world:
  height: 11
  width: 11
  step_time: 0.1
  sample_time: 0.1
  offset: [1.3, 1.3]
  collision_mode: 'stop'
  control_mode: 'auto'

robot:
  - kinematics: {name: 'omni'}
    shape: {name: 'rectangle', length: 0.42, width: 0.26}
    state: [-0.3, 6.6, 0]
    goal: [13.1, 6.6, 0]
    vel_min: [-2, -2]
    vel_max: [2, 2]
    goal_threshold: 0.1
    plot:
      show_trail: True
      show_goal: False
      show_trajectory: False
    sensors:
      - type: 'lidar2d'
        range_min: 0
        range_max: 3
        angle_range: 6.28
        number: 50
        noise: False

obstacle:
  - number: 10
    distribution: {name: 'manual'}
    state: [[5.2, 8.9], [8.1, 10.0], [2.6, 5.2], [10.8, 6.6], [5.2, 3.4], [4.2, 6.8], [2.6, 6.3], [4.7, 5.2], [4.2, 6.8], [5.0, 6.8], [2.6, 7.9]]
    shape:
      - {name: 'circle', radius: 0.4}
      - {name: 'circle', radius: 0.3}
  - number: 1
    distribution: {name: 'manual'}
    state: [0, 0, 0]
    shape:
      - {name: 'polygon', vertices: [[8.1, 6.3], [8.7, 6.3], [8.7, 7.3], [8.1, 7.3]]}
