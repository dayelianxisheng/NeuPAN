world:
  height: 3.0
  width: 7.0
  step_time: 0.1
  sample_time: 0.1
  offset: [-0.5, -0.3]
  collision_mode: 'stop'
  control_mode: 'auto'

robot:
  - kinematics: {name: 'omni'}
    shape: {name: 'rectangle', length: 0.42, width: 0.26}
    state: [-0.2, 1.2, 0]
    goal: [6.5, 1.2, 0]
    vel_min: [-2, -2]
    vel_max: [2, 2]
    goal_threshold: 0.08
    plot:
      show_trail: True
      show_goal: False
      show_trajectory: False
    sensors:
      - type: 'lidar2d'
        range_min: 0
        range_max: 6.0
        angle_range: 6.28
        number: 64
        noise: False

obstacle:
  - number: 10
    distribution: {name: 'manual'}
    shape:
      # 上下墙壁
      - {name: 'rectangle', length: 7.5, width: 0.2}
      - {name: 'rectangle', length: 7.5, width: 0.2}
      # 圆柱体障碍物（各种大小，交错排列，分组密集）
      - {name: 'circle', radius: 0.18}
      - {name: 'circle', radius: 0.12}
      - {name: 'circle', radius: 0.15}
      - {name: 'circle', radius: 0.12}
      - {name: 'circle', radius: 0.2}
      - {name: 'circle', radius: 0.12}
      - {name: 'circle', radius: 0.15}
      - {name: 'circle', radius: 0.12}
    state:
      - [3.0, 2.4, 0]
      - [3.0, 0.0, 0]
      # 第一组：密集双柱（左侧）
      - [0.8, 1.4, 0]
      - [1.0, 0.9, 0]
      # 第二组：单柱挡路中
      - [1.8, 1.2, 0]
      # 第三组：交错排列（中间）
      - [2.6, 1.7, 0]
      - [2.8, 0.7, 0]
      # 第四组：密集三柱（右侧）
      - [3.8, 1.4, 0]
      - [4.0, 0.8, 0]
      - [4.2, 1.8, 0]
