world:
  height: 11
  width: 13
  step_time: 0.1
  sample_time: 0.1
  offset: [-0.5, 1.3]
  collision_mode: 'unobstructed_obstacles'  # 'stop', 'unobstructed', 'reactive', unobstructed_obstacles
  control_mode: 'auto'  # 'keyboard', 'auto'

robot:
  - kinematics: {name: 'omni'}
    shape: {name: 'rectangle', length: 0.42, width: 0.26}
    vel_min: [-2, -2]
    vel_max: [2, 2]
    goal_threshold: 0.1
    state: [-0.3, 6.6, 0]
    goal: [10.5, 10.5, 0]
    plot:
      show_trail: True
      show_goal: False
      show_trajectory: False
    sensors:
      - type: 'lidar2d'
        range_min: 0
        range_max: 3
        angle_range: 6.28
        number: 50
        noise: False


obstacle:
  - number: 11
    distribution: {name: 'random', range_low: [1.3, 3.9, -3.14], range_high: [11.8, 9.2, 3.14]}
    kinematics: {name: 'omni'}
    shape:
      - {name: 'polygon', vertices: [[-0.3, -0.3], [0.3, -0.3], [0.3, 0.3], [-0.3, 0.3]]}
      - {name: 'circle', radius: 0.4}
      - {name: 'circle', radius: 0.3}
      - {name: 'polygon', random_shape: true, center_range: [0, 0, 0, 0], avg_radius_range: [0.15, 0.4], irregularity_range: [0.9, 0.9]}

    behavior: {name: 'rvo', vxmax: 0.3, vymax: 0.3, accer: 1.0, factor: 0.5, range_low: [1.3, 3.9, -3.14], range_high: [11.8, 9.2, 3.14], wander: True}

    vel_min: [-1.0, -1.0]
    vel_max: [1.0, 1.0]
    arrive_mode: position
    goal_threshold: 0.3
    plot:
      show_goal: False
      show_arrow: True