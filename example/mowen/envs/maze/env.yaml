world:
  height: 18
  width: 16
  step_time: 0.1
  sample_time: 0.1
  offset: [1, 1]
  collision_mode: 'stop'
  control_mode: 'auto'

robot:
  - kinematics: {name: 'omni'}
    shape: {name: 'rectangle', length: 0.42, width: 0.26}
    state: [1.5, 1.5, 0]
    goal: [14.5, 16.5, 0]
    vel_min: [-2, -2]
    vel_max: [2, 2]
    goal_threshold: 0.15
    plot:
      show_trail: True
      show_goal: False
      show_trajectory: False
    sensors:
      - type: 'lidar2d'
        range_min: 0
        range_max: 4.0
        angle_range: 6.28
        number: 64
        noise: False

obstacle:
  # ══════════════════════════════════════════════
  # 矩形 ×10（5 堵主墙 + 5 个内部隔断）
  # ══════════════════════════════════════════════
  # 主墙蛇形走廊左右交替开口
  #   右口：x=15.5→17（墙跨度 1.5→15.5）
  #   左口：x=1→2.5（墙跨度 2.5→17）
  - number: 10
    distribution: {name: 'manual'}
    shape:
      # 主墙 5 堵（长 14m×厚 0.25m）
      - {name: 'rectangle', length: 14, width: 0.25}
      - {name: 'rectangle', length: 14, width: 0.25}
      - {name: 'rectangle', length: 14, width: 0.25}
      - {name: 'rectangle', length: 14, width: 0.25}
      - {name: 'rectangle', length: 14, width: 0.25}
      # 内部隔断 5 个
      - {name: 'rectangle', length: 1.2, width: 0.2}
      - {name: 'rectangle', length: 1.0, width: 0.2}
      - {name: 'rectangle', length: 0.8, width: 0.2}
      - {name: 'rectangle', length: 0.8, width: 0.2}
      - {name: 'rectangle', length: 1.2, width: 0.2}
    state:
      # 主墙：右口(y=3.5) → 左口(y=6.5) → 右口(y=9.5) → 左口(y=12.5) → 右口(y=15.5)
      - [8.25, 3.5, 0]    # 墙1 右口：跨度 x=1→15.5，口=15.5→17
      - [9.75, 6.5, 0]   # 墙2 左口：跨度 x=2.5→17，口=1→2.5
      - [8.25, 9.5, 0]    # 墙3 右口
      - [9.75, 12.5, 0]  # 墙4 左口
      - [8.25, 15.5, 0]   # 墙5 右口
      # 内部隔断
      - [4, 5, 0]
      - [12, 7.5, 0]
      - [5, 10.5, 0]
      - [13, 13.5, 0]
      - [7, 14.5, 0]

  # ══════════════════════════════════════════════
  # 圆柱 ×5（半径 0.18~0.30）
  # ══════════════════════════════════════════════
  - number: 5
    distribution: {name: 'manual'}
    shape:
      - {name: 'circle', radius: 0.25}
      - {name: 'circle', radius: 0.20}
      - {name: 'circle', radius: 0.30}
      - {name: 'circle', radius: 0.22}
      - {name: 'circle', radius: 0.18}
    state:
      - [3.5, 2, 0]
      - [11.5, 4.5, 0]
      - [7.5, 8, 0]
      - [10.5, 11.5, 0]
      - [5.5, 15.5, 0]

  # ══════════════════════════════════════════════
  # 三角形 ×5（polygon 定点，底 0.6m×高 0.8m）
  # ══════════════════════════════════════════════
  - number: 1
    distribution: {name: 'manual'}
    state: [0, 0, 0]
    shape:
      - {name: 'polygon', vertices: [[4.7, 2.8], [5.3, 2.8], [5, 3.7]]}
  - number: 1
    distribution: {name: 'manual'}
    state: [0, 0, 0]
    shape:
      - {name: 'polygon', vertices: [[10.7, 5.8], [11.3, 5.8], [11, 6.7]]}
  - number: 1
    distribution: {name: 'manual'}
    state: [0, 0, 0]
    shape:
      - {name: 'polygon', vertices: [[3.2, 8.8], [3.8, 8.8], [3.5, 9.7]]}
  - number: 1
    distribution: {name: 'manual'}
    state: [0, 0, 0]
    shape:
      - {name: 'polygon', vertices: [[12.7, 10.3], [13.3, 10.3], [13, 11.2]]}
  - number: 1
    distribution: {name: 'manual'}
    state: [0, 0, 0]
    shape:
      - {name: 'polygon', vertices: [[7.7, 14.3], [8.3, 14.3], [8, 15.2]]}

  # ══════════════════════════════════════════════
  # 随机多边形 ×5（random_shape）
  # ══════════════════════════════════════════════
  - number: 5
    distribution: {name: 'manual'}
    shape:
      - {name: 'polygon', random_shape: true, center_range: [0, 0, 0, 0],
         avg_radius_range: [0.18, 0.35], irregularity_range: [0.8, 1.0]}
    state:
      - [3, 14.5]
      - [9, 1.5]
      - [13.5, 4]
      - [6.5, 16.5]
      - [12, 15]

  # ══════════════════════════════════════════════
  # 动态圆形 ×30（6 层走廊，每层 5 个）
  # ══════════════════════════════════════════════
  # 每层范围避开墙壁和静态障碍物，RVO 会自然绕开

  # 第1层：起点层（墙1下方，y<3.5）
  - number: 5
    distribution: {name: 'random', range_low: [2, 1.8, -3.14], range_high: [16, 3.2, 3.14]}
    kinematics: {name: 'omni'}
    shape:
      - {name: 'circle', radius: 0.14}
      - {name: 'circle', radius: 0.12}
      - {name: 'circle', radius: 0.16}
      - {name: 'circle', radius: 0.11}
      - {name: 'circle', radius: 0.15}
    behavior:
      - {name: 'rvo', range_low: [2, 1.8, -3.14], range_high: [16, 3.2, 3.14],
         wander: True, vxmax: 0.35, vymax: 0.25}
    vel_min: [-0.5, -0.5]
    vel_max: [0.5, 0.5]
    arrive_mode: position
    goal_threshold: 0.5
    plot:
      show_goal: False
      show_arrow: True

  # 第2层：墙1→墙2（y=3.5→6.5）
  - number: 5
    distribution: {name: 'random', range_low: [2, 3.8, -3.14], range_high: [16, 6.2, 3.14]}
    kinematics: {name: 'omni'}
    shape:
      - {name: 'circle', radius: 0.13}
      - {name: 'circle', radius: 0.15}
      - {name: 'circle', radius: 0.12}
      - {name: 'circle', radius: 0.17}
      - {name: 'circle', radius: 0.14}
    behavior:
      - {name: 'rvo', range_low: [2, 3.8, -3.14], range_high: [16, 6.2, 3.14],
         wander: True, vxmax: 0.35, vymax: 0.25}
    vel_min: [-0.5, -0.5]
    vel_max: [0.5, 0.5]
    arrive_mode: position
    goal_threshold: 0.5
    plot:
      show_goal: False
      show_arrow: True

  # 第3层：墙2→墙3（y=6.5→9.5）
  - number: 5
    distribution: {name: 'random', range_low: [2, 6.8, -3.14], range_high: [16, 9.2, 3.14]}
    kinematics: {name: 'omni'}
    shape:
      - {name: 'circle', radius: 0.15}
      - {name: 'circle', radius: 0.11}
      - {name: 'circle', radius: 0.13}
      - {name: 'circle', radius: 0.16}
      - {name: 'circle', radius: 0.12}
    behavior:
      - {name: 'rvo', range_low: [2, 6.8, -3.14], range_high: [16, 9.2, 3.14],
         wander: True, vxmax: 0.35, vymax: 0.25}
    vel_min: [-0.5, -0.5]
    vel_max: [0.5, 0.5]
    arrive_mode: position
    goal_threshold: 0.5
    plot:
      show_goal: False
      show_arrow: True

  # 第4层：墙3→墙4（y=9.5→12.5）
  - number: 5
    distribution: {name: 'random', range_low: [2, 9.8, -3.14], range_high: [16, 12.2, 3.14]}
    kinematics: {name: 'omni'}
    shape:
      - {name: 'circle', radius: 0.12}
      - {name: 'circle', radius: 0.14}
      - {name: 'circle', radius: 0.16}
      - {name: 'circle', radius: 0.13}
      - {name: 'circle', radius: 0.15}
    behavior:
      - {name: 'rvo', range_low: [2, 9.8, -3.14], range_high: [16, 12.2, 3.14],
         wander: True, vxmax: 0.35, vymax: 0.25}
    vel_min: [-0.5, -0.5]
    vel_max: [0.5, 0.5]
    arrive_mode: position
    goal_threshold: 0.5
    plot:
      show_goal: False
      show_arrow: True

  # 第5层：墙4→墙5（y=12.5→15.5）
  - number: 5
    distribution: {name: 'random', range_low: [2, 12.8, -3.14], range_high: [16, 15.2, 3.14]}
    kinematics: {name: 'omni'}
    shape:
      - {name: 'circle', radius: 0.15}
      - {name: 'circle', radius: 0.13}
      - {name: 'circle', radius: 0.11}
      - {name: 'circle', radius: 0.16}
      - {name: 'circle', radius: 0.14}
    behavior:
      - {name: 'rvo', range_low: [2, 12.8, -3.14], range_high: [16, 15.2, 3.14],
         wander: True, vxmax: 0.35, vymax: 0.25}
    vel_min: [-0.5, -0.5]
    vel_max: [0.5, 0.5]
    arrive_mode: position
    goal_threshold: 0.5
    plot:
      show_goal: False
      show_arrow: True

  # 第6层：终点层（墙5上方，y>15.5）
  - number: 5
    distribution: {name: 'random', range_low: [2, 15.8, -3.14], range_high: [16, 17.5, 3.14]}
    kinematics: {name: 'omni'}
    shape:
      - {name: 'circle', radius: 0.14}
      - {name: 'circle', radius: 0.12}
      - {name: 'circle', radius: 0.16}
      - {name: 'circle', radius: 0.13}
      - {name: 'circle', radius: 0.15}
    behavior:
      - {name: 'rvo', range_low: [2, 15.8, -3.14], range_high: [16, 17.5, 3.14],
         wander: True, vxmax: 0.35, vymax: 0.25}
    vel_min: [-0.5, -0.5]
    vel_max: [0.5, 0.5]
    arrive_mode: position
    goal_threshold: 0.5
    plot:
      show_goal: False
      show_arrow: True
