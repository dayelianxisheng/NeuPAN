# ═══════════════════════════════════════════════════════
# mowen omni | tight_space — 4×4 窄缝迷宫
# 障碍物：圆柱 + 矩形，通道宽度仅 0.35~0.45m
# 目的：测试 NeuPAN 在狭窄场景的通行能力
# ═══════════════════════════════════════════════════════

receding: 10
step_time: 0.15
ref_speed: 0.3
device: 'cpu'
time_print: True
collision_threshold: 0.1

robot:
  kinematics: 'omni'
  max_speed: [0.8, 0.8]
  max_acce: [0.5, 0.5]
  length: 0.42
  width: 0.26

ipath:
  waypoints: [[0.5, 0.5, 0], [3.5, 3.5, 0]]
  curve_style: 'line'
  min_radius: 0
  loop: False
  arrive_threshold: 0.2
  close_threshold: 0.1
  ind_range: 10
  arrive_index_threshold: 1

pan:
  iter_num: 2
  dune_max_num: 100
  nrmp_max_num: 30
  iter_threshold: 0.1
  dune_checkpoint: 'example/mowen/model/mowen_real/model_5000.pth'

adjust:
  q_s: 0.5
  p_u: 1.0
  eta: 8.0
  d_max: 0.12
  d_min: 0.05
  solver: "SCS"

astar:
  robot_radius: 0.15
  resolution: 0.05
