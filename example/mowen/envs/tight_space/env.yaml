world:
  height: 4.0
  width: 4.0
  step_time: 0.1
  sample_time: 0.1
  offset: [0, 0]
  collision_mode: 'stop'
  control_mode: 'auto'

robot:
  - kinematics: {name: 'omni'}
    shape: {name: 'rectangle', length: 0.42, width: 0.26}
    state: [0.5, 0.5, 0]
    goal: [3.5, 3.5, 0]
    vel_min: [-0.8, -0.8]
    vel_max: [0.8, 0.8]
    goal_threshold: 0.2
    plot:
      show_trail: True
      show_goal: False
      show_trajectory: False
    sensors:
      - type: 'lidar2d'
        range_min: 0.1
        range_max: 5.0
        angle_range: 6.28
        number: 80
        noise: False

obstacle:
  # === 围墙 ===
  - number: 4
    distribution: {name: 'manual'}
    shape:
      - {name: 'rectangle', length: 4.2, width: 0.15}
      - {name: 'rectangle', length: 4.2, width: 0.15}
      - {name: 'rectangle', length: 0.15, width: 4.2}
      - {name: 'rectangle', length: 0.15, width: 4.2}
    state:
      - [2.0, 4.0, 0]
      - [2.0, 0.0, 0]
      - [0.0, 2.0, 0]
      - [4.0, 2.0, 0]

  # === 内部隔墙：形成蛇形走廊 ===
  - number: 3
    distribution: {name: 'manual'}
    shape:
      - {name: 'rectangle', length: 0.15, width: 2.4}
      - {name: 'rectangle', length: 2.4, width: 0.15}
      - {name: 'rectangle', length: 2.4, width: 0.15}
    state:
      - [1.025, 2.0, 0]    # 左竖墙：x~0.950-1.100, y~0.8-3.2（通道宽~0.40m）
      - [2.0, 1.2, 0]    # 中下横墙：x~0.8-3.2, y~1.125-1.275
      - [2.0, 2.8, 0]    # 中上横墙：x~0.8-3.2, y~2.725-2.875

  # === 圆柱体：缩小通道（考验 NeuPAN 窄缝通行能力） ===
  - number: 5
    distribution: {name: 'manual'}
    shape:
      - {name: 'circle', radius: 0.10}
      - {name: 'circle', radius: 0.10}
      - {name: 'circle', radius: 0.10}
      - {name: 'circle', radius: 0.10}
      - {name: 'circle', radius: 0.12}
    state:
      - [1.6, 1.4, 0]    # 左下通道：距左墙 x~1.275→通←1.50→0.225m
      - [1.6, 2.6, 0]    # 左上通道
      - [3.0, 1.4, 0]    # 右下通道：距右墙 x~3.925→通←2.90→0.375m
      - [3.0, 2.6, 0]    # 右上通道
      - [2.2, 2.0, 0]    # 中央障碍（r=0.12）
