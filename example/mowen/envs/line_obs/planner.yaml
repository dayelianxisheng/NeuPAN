# ═══════════════════════════════════════════════════════
# mowen omni | line_obs — 3米直线避障测试
# 每隔0.75m一个圆形障碍物，模拟真机锥桶场景
# ═══════════════════════════════════════════════════════

# ── MPC 参数 ─────────────────────────────────
receding: 8
step_time: 0.15
ref_speed: 1.5
device: 'cpu'
time_print: True
collision_threshold: 0.1

# ── 机器人运动学 ────────────────────────────
robot:
  kinematics: 'omni'
  max_speed: [1.0, 1.0]
  max_acce: [1.0, 1.0]
  length: 0.42
  width: 0.26

# ── 初始参考路径 ─────────────────────────────
ipath:
  waypoints: [[0, 1.2, 0], [3, 1.2, 0]]
  curve_style: 'line'
  min_radius: 1.0
  loop: False
  arrive_threshold: 0.15
  close_threshold: 0.1
  ind_range: 10
  arrive_index_threshold: 1

# ── PAN 迭代网络 ─────────────────────────────
pan:
  iter_num: 2
  dune_max_num: 100
  nrmp_max_num: 10
  iter_threshold: 0.1
  dune_checkpoint: 'example/mowen/model/mowen_real/model_5000.pth'

# ── 调参（真机验证通过参数） ──────────────────
adjust:
  q_s: 0.5
  p_u: 1.0
  eta: 8.0
  d_max: 0.3
  d_min: 0.05
