world:
  height: 2.5
  width: 4.5
  step_time: 0.1
  sample_time: 0.1
  offset: [-0.5, 0.2]
  collision_mode: 'stop'
  control_mode: 'auto'

robot:
  - kinematics: {name: 'omni'}
    shape: {name: 'rectangle', length: 0.42, width: 0.26}
    state: [-0.2, 1.2, 0]
    goal: [3.5, 1.2, 0]
    vel_min: [-2, -2]
    vel_max: [2, 2]
    goal_threshold: 0.08
    plot:
      show_trail: True
      show_goal: False
      show_trajectory: False
    sensors:
      - type: 'lidar2d'
        range_min: 0
        range_max: 4.0
        angle_range: 6.28
        number: 50
        noise: False

obstacle:
  - number: 5
    distribution: {name: 'manual'}
    shape:
      - {name: 'rectangle', length: 4.0, width: 0.2}
      - {name: 'rectangle', length: 4.0, width: 0.2}
      - {name: 'rectangle', length: 0.15, width: 0.9}
      - {name: 'rectangle', length: 0.15, width: 0.9}
      - {name: 'rectangle', length: 0.15, width: 0.8}
    state:
      - [1.5, 2.0, 0]
      - [1.5, 0.4, 0]
      - [0.5, 1.5, 0]
      - [1.3, 0.9, 0]
      - [2.25, 1.5, 0]
