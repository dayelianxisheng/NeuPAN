world:
  height: 6
  width: 18
  step_time: 0.1
  sample_time: 0.1
  offset: [-0.8, 2.6]
  collision_mode: 'stop'
  control_mode: 'auto'

robot:
  - kinematics: {name: 'omni'}
    shape: {name: 'rectangle', length: 0.42, width: 0.26}
    state: [-1.3, 5.2, 0]
    goal: [10.5, 10.5, 0]
    vel_min: [-2, -2]
    vel_max: [2, 2]
    goal_threshold: 0.08
    plot:
      show_trail: True
      show_goal: False
      show_trajectory: False
    sensors:
      - type: 'lidar2d'
        range_min: 0
        range_max: 2.6
        angle_range: 6.28
        number: 50
        noise: False

obstacle:
  - number: 6
    distribution: {name: 'manual'}
    shape:
      - {name: 'rectangle', length: 18, width: 0.5}
      - {name: 'rectangle', length: 18, width: 0.5}
      - {name: 'rectangle', length: 1.3, width: 0.5}
      - {name: 'rectangle', length: 1.3, width: 0.5}
      - {name: 'rectangle', length: 1.6, width: 0.5}
      - {name: 'rectangle', length: 1.3, width: 0.5}
    state: [[7.9, 6.6, 0], [7.9, 3.9, 0], [2.6, 4.8, 1.57], [6.0, 5.6, 1.57], [9.4, 4.5, 2.1], [13.1, 5.8, 4.3]]
