# ── MPC 参数 ─────────────────────────────────
receding: 8            # 滚动时域步数（越多越远）
step_time: 0.15        # 每步时间 (s)
ref_speed: 0.5           # 参考线速度 (m/s)
device: 'cpu'          # cvxpylayers 只支持 CPU
time_print: True       # 打印各模块耗时
collision_threshold: 0.1  # 最小安全距离 (m)

# ── 机器人运动学 ────────────────────────────
robot:
  kinematics: 'omni'   # 全向模型
  max_speed: [1.0, 1.0]
  max_acce: [1.0, 1.0]
  length: 0.42         # 必须与训练尺寸一致！
  width: 0.26

# ── 初始参考路径 ─────────────────────────────
ipath:
  waypoints: [[-1.3, 5.2, 0], [15, 5.2, 0]]
  curve_style: 'line'
  min_radius: 1.0
  loop: True
  arrive_threshold: 0.1
  close_threshold: 0.1
  ind_range: 10
  arrive_index_threshold: 1

# ── PAN 迭代网络 ─────────────────────────────
pan:
  iter_num: 2
  dune_max_num: 100
  nrmp_max_num: 10
  iter_threshold: 0.1
  dune_checkpoint: 'example/mowen/model/mowen_real/model_5000.pth'

# ── 调参 ──────────────────────────────────
adjust:
  q_s: 0.5
  p_u: 1.0
  eta: 8.0
  d_max: 0.15
  d_min: 0.05

# === A* 全局规划（存在此配置时 eval.py 自动启用） ===
