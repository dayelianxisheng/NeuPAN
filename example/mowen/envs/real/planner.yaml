# ═══════════════════════════════════════════════════════
# mowen 真机部署配置
# ═══════════════════════════════════════════════════════

receding: 8
step_time: 0.15
ref_speed: 0.5          # 真机低速保守
device: 'cpu'
time_print: True
collision_threshold: 0.15   # 真机安全距离加大

robot:
  kinematics: 'omni'
  max_speed: [0.5, 0.5]     # 真机限速
  max_acce: [0.5, 0.5]
  length: 0.42
  width: 0.26

ipath:
  # waypoints 由 goal 动态生成，这里给默认值
  waypoints: [[0, 0, 0], [1, 0, 0]]
  curve_style: 'line'
  min_radius: 1.0
  loop: False
  arrive_threshold: 0.5     # 真机容差放大
  close_threshold: 0.5
  ind_range: 10
  arrive_index_threshold: 1

pan:
  iter_num: 2
  dune_max_num: 100
  nrmp_max_num: 10
  iter_threshold: 0.1
  dune_checkpoint: 'example/mowen/model/mowen_real/model_5000.pth'

adjust:
  q_s: 1.0                 # 严格路径跟踪（真机不要乱动）
  p_u: 1.0
  eta: 10.0
  d_max: 0.5
  d_min: 0.1
