world:
  height: 5.0
  width: 7.0
  step_time: 0.1
  sample_time: 0.1
  offset: [-0.5, -0.5]
  collision_mode: 'stop'
  control_mode: 'auto'

robot:
  - kinematics: {name: 'omni'}
    shape: {name: 'rectangle', length: 0.42, width: 0.26}
    state: [0.5, 0.5, 0]
    goal: [6.0, 4.0, 0]
    vel_min: [-1, -1]
    vel_max: [1, 1]
    goal_threshold: 0.15
    plot:
      show_trail: True
      show_goal: False
      show_trajectory: False
    sensors:
      - type: 'lidar2d'
        range_min: 0
        range_max: 5.0
        angle_range: 6.28
        number: 80
        noise: False

obstacle:
  # === 静态障碍（墙壁 + 大障碍物） ===
  - number: 8
    distribution: {name: 'manual'}
    shape:
      - {name: 'rectangle', length: 7.5, width: 0.3}
      - {name: 'rectangle', length: 7.5, width: 0.3}
      - {name: 'rectangle', length: 0.3, width: 4.5}
      - {name: 'rectangle', length: 0.3, width: 4.5}
      - {name: 'rectangle', length: 1.2, width: 0.8}
      - {name: 'rectangle', length: 0.8, width: 1.0}
      - {name: 'rectangle', length: 1.5, width: 0.5}
      - {name: 'rectangle', length: 0.6, width: 0.6}
    state:
      - [3.5, 5.0, 0]
      - [3.5, -0.1, 0]
      - [0.0, 2.5, 0]
      - [6.9, 2.5, 0]
      - [2.0, 3.0, 0]
      - [4.5, 3.5, 0]
      - [3.5, 1.5, 0]
      - [5.5, 2.0, 0]

  # === 动态障碍物（RVO 漫游） ===
  - number: 5
    distribution: {name: 'random', range_low: [0.8, 0.8, -3.14], range_high: [6.0, 4.0, 3.14]}
    kinematics: {name: 'omni'}
    shape:
      - {name: 'circle', radius: 0.15}
      - {name: 'circle', radius: 0.18}
      - {name: 'circle', radius: 0.12}
      - {name: 'circle', radius: 0.2}
      - {name: 'circle', radius: 0.15}
    behavior:
      - {name: 'rvo', range_low: [0.5, 0.5, -3.14], range_high: [6.5, 4.5, 3.14], wander: True, vxmax: 0.3, vymax: 0.3}
    vel_min: [-0.5, -0.5]
    vel_max: [0.5, 0.5]
    arrive_mode: position
    goal_threshold: 0.5
    plot:
      show_goal: False
      show_arrow: True
