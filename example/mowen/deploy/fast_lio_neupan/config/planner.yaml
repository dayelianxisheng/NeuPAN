# Fast-LIO + NeuPAN 规划器配置
# NeuPAN 负责局部路径跟踪 + 避障，Fast-LIO 负责定位
# 定位帧: odom（由 Fast-LIO 提供）
receding: 10
step_time: 0.1
ref_speed: 0.5
device: 'cpu'
time_print: True
collision_threshold: 0.1

robot:
  kinematics: 'omni'
  max_speed: [8, 6.28]
  max_acce: [2, 1]
  length: 0.42
  width: 0.26

ipath:
  interval: 0.09
  waypoints: [[0.0, 0.0, 0]]
  curve_style: 'line'
  min_radius: 0
  loop: False
  arrive_threshold: 0.15
  close_threshold: 0.1
  ind_range: 30
  arrive_index_threshold: 1

pan:
  iter_num: 2
  dune_max_num: 100
  nrmp_max_num: 15
  iter_threshold: 0.1
  dune_checkpoint: 'example/mowen/model/mowen_real/model_5000.pth'

adjust:
  q_s: 0.6
  p_u: 0.4
  eta: 10.0
  d_max: 0.3
  d_min: 0.03
