# Pure NeuPAN 路径跟踪 — 固定 waypoints，无地图
receding: 8
step_time: 0.15
ref_speed: 0.7
device: 'cpu'
time_print: True
collision_threshold: 0.1

robot:
  kinematics: 'omni'
  max_speed: [1.0, 1.0]
  max_acce: [1.0, 1.0]
  length: 0.42
  width: 0.26

ipath:
  waypoints: [[-1.3, 5.2, 0], [15, 5.2, 0]]
  curve_style: 'line'
  min_radius: 1.0
  loop: False
  arrive_threshold: 0.1
  close_threshold: 0.1
  ind_range: 10
  arrive_index_threshold: 1

pan:
  iter_num: 2
  dune_max_num: 100
  nrmp_max_num: 10
  iter_threshold: 0.1
  dune_checkpoint: 'example/mowen/model/mowen_real/model_5000.pth'

adjust:
  q_s: 0.5
  p_u: 1.0
  eta: 8.0
  d_max: 0.3
  d_min: 0.05
