# Pure NeuPAN 路径跟踪 — 固定 waypoints，无地图
receding: 10
step_time: 0.15
ref_speed: 0.8
device: 'cpu'
time_print: True
collision_threshold: 0.1

robot:
  kinematics: 'omni'
  max_speed: [1.0, 2.0]
  max_acce: [1.0, 2.0]
  length: 0.42
  width: 0.26

ipath:

  waypoints: [[-1, 0, 0]]

  curve_style: 'line'
  min_radius: 1.0
  loop: False
  arrive_threshold: 0.1
  close_threshold: 0.05
  ind_range: 10
  arrive_index_threshold: 1

pan:
  iter_num: 2
  dune_max_num: 100w
  nrmp_max_num: 10
  iter_threshold: 0.1
  dune_checkpoint: 'example/mowen/model/mowen_real/model_5000.pth'

adjust:
  q_s: 0.5
  p_u: 1.0
  eta: 8.0
  d_max: 0.15
  d_min: 0.05
  solver: "SCS"

# 后退注意事项：
# - waypoints 不能包含起始位置（第一个点不能是 [0,0,0]）
# - 后退用负值：waypoints: [[-1, 0, 0]]（单点即可，不要 [[0,0,0], [-0.5,0,0]]）
