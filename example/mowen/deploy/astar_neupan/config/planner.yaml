# A* + NeuPAN 导航 — 地图帧，AMCL 定位
receding: 10
step_time: 0.15
ref_speed: 0.5
device: 'cpu'
time_print: True
collision_threshold: 0.1

robot:
  kinematics: 'omni'
  max_speed: [1.0, 1.0]
  max_acce: [1.0, 1.0]
  length: 0.42
  width: 0.26

ipath:
  interval: 0.09
  waypoints: [[0.0, 0, 0]]
  curve_style: 'line'
  min_radius: 0
  loop: False
  arrive_threshold: 0.15
  close_threshold: 0.1
  ind_range: 10
  arrive_index_threshold: 1

pan:
  iter_num: 2
  dune_max_num: 100
  nrmp_max_num: 30
  iter_threshold: 0.1
  dune_checkpoint: 'example/mowen/model/mowen_real/model_5000.pth'

adjust:
  q_s: 0.5
  p_u: 1.0
  eta: 8.0
  d_max: 0.15
  d_min: 0.05
  solver: "SCS"

astar:
  robot_radius: 0.25
  resolution: 0.05
